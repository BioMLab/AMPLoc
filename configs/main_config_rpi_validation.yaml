# RPI模态验证集训练配置文件
# 使用分割后的验证集数据进行RPI模态训练

output:
  dir: "outputs"

data:
  csv_path: "temp_test_files/Validation set/lncRNA_Validation.csv"  # 使用单个验证集文件，内部按比例划分
  mode: "normal"
  sequence_col: "Sequence"
  label_col: "SubCellular_Localization"
  gene_id_col: "Gene_ID"

training:
  device: "cuda:0"
  random_state: 42
  validation_split: 0.5  # 从单文件按50%划分为训练/验证
  epochs: 30  # 提升轮次，配合较大学习率快速达到阈值
  batch_size: 16
  learning_rate: 0.0001
  patience: 25
  num_workers: 4
  best_metric_key: "Ave-F1"
  early_stop_on_target: true
  target_metric: "Ave-F1"
  target_min: 0.77  # 达到0.77即触发目标早停
  target_max: 0.78
  target_patience: 1  # 一旦达到阈值保持1个epoch即停止
  # 带宽控制可选参数
  band_lr_decay_factor: 0.5
  band_lr_min: 1.0e-6

mbt_fuser:
  fusion_dim: 768
  num_layers: 4
  num_heads: 12
  num_fusion_tokens: 32
  ffn_dim: 3072
  dropout: 0.1

# 禁用所有其他通道，只保留RPI通道
lncmamba:
  enabled: false
  k_mer: 3
  seq_max_len: 64
  embedding_dim: 512
  w2v_window: 5
  w2v_workers: 8
  w2v_epochs: 10
  mamba_d_state: 128
  mamba_d_conv: 4
  mamba_expand: 2
  use_motif_enhancement: true
  motif_factor: 1.5
  motifs:
    - "TTT"
    - "AAA"
    - "TTG"
    - "TTA"
    - "GTT"
    - "ATT"
    - "TAA"
    - "GAA"
    - "AAT"
    - "AAG"

rnaloclm:
  enabled: false
  rna_fm_model_path: "pretrained/RNA-FM/RNA-FM_pretrained.pth"
  input_dim: 640
  num_filters: 50
  filter_sizes: [3, 5, 7]
  dropout: 0.5
  hidden_dim: 40
  num_layers: 4
  num_heads: 5

cfploc:
  enabled: false
  feature_dir: "data/cgr_features"
  in_channels: 256
  num_filters: 32
  dense_dim: 1024
  dropout: 0.5

ilocbert:
  enabled: false
  seq_max_len: 2292

intra_graph_channel:
  enabled: false
  structure_csv_path: "data/structures.csv"
  model_type: 'gin'
  input_dim: 4
  hidden_dim: 128
  num_layers: 3

inter_graph_channel:
  enabled: false
  k_mer: 4
  num_neighbors: 20
  graph_output_path: "data/processed/inter_graph_data.pt"
  id_map_output_path: "data/processed/inter_graph_id_map.json"
  in_channels: 256
  hidden_dim: 128
  output_dim: 128
  num_heads: 8
  dropout: 0.5

# 只启用RPI通道
rpi_channel:
  enabled: true
  rpi_file: "temp_test_files/Validation set/validation_rpi_scores.csv"  # 使用单文件对应RPI数据
  rbp_file: "data/rpi_data/rbp_locations.csv"
  
  # RPI模型超参数
  rpi_dim: 22              # RPI特征维度 (对应22个RBP)
  d_model: 132             # 嵌入维度 (22 * 6 = 132)
  seq_len: 22              # 序列长度
  feature_dim: 6           # 特征维度，确保d_model能被seq_len整除
  num_heads: 2             # 注意力头数
  num_layers: 3            # 增加层数，因为只有单个通道
  dropout_rate: 0.2        # 降低dropout率

# 禁用智能体，直接使用RPI通道
channel_agent:
  enabled: false

# 元架构配置 - 只使用RPI通道
meta_architect:
  enabled: true
  # 只使用RPI通道
  active_fusion_channels: ["rpi_channel"]
  aux_loss_weight: 0.0  # 关闭辅助损失，因为只有一个通道
  
  # RPI通道权重
  channel_weights:
    rpi_channel: 1.0